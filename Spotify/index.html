<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Style.css">
</head>
<body>
  <div id="app" class="page-shell">
    <aside id="menu" class="sidebar">
      <a id="logo" href="index.html" class="brand">Spotify</a>

      <nav class="nav-links" aria-label="Primary navigation">
        <button class="nav-btn active" type="button">Library</button>
        <button class="nav-btn" type="button">Favorites</button>
      </nav>

    </aside>

    <main class="main-content">
      <header class="topbar sticky">
        <div class="search-box top-search">
          <span class="search-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="10.5" cy="10.5" r="7" stroke="currentColor" stroke-width="1.8" />
              <path d="M16.75 16.75L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </span>
          <input id="search" type="search" aria-label="What do you want to play?" placeholder="What do you want to play?" autocomplete="off">
          <div id="suggestions" class="suggestions"></div>
        </div>
      </header>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>What do you want to listen to?</h2>
            <p class="section-description"></p>
          </div>
        </div>

        <div id="albumGrid" class="grid" tabindex="0" aria-label="Artist album grid">

          <a class="album-card" href="The-Weeknd.html" data-search="The Weeknd" data-bg="#941815" data-preview="Audios/The Weeknd/Blinding Lights.mp3">
            <div class="album-art">
              <img src="Images/the weeknd.jpg" alt="The Weeknd" loading="lazy">
            </div>
            <div class="album-meta">
              <b>The Weeknd</b>
              <span>Artist</span>
            </div>
          </a>

          <a class="album-card" href="Lana-Del-Rey.html" data-search="Lana Del Rey" data-bg="#5c3f8d" data-preview="Audios/Lana Del Rey/Video Games.mp3">
            <div class="album-art">
              <img src="Images/lana del rey.jpg" alt="Lana Del Rey" loading="lazy">
            </div>
            <div class="album-meta">
              <b>Lana Del Rey</b>
              <span>Artist</span>
            </div>
          </a>

          <a class="album-card" href="Billie Eillish.html" data-search="Billie Eillish" data-bg="#0b6f6f" data-preview="Audios/Billie Eillish/bad guy.mp3">
            <div class="album-art">
              <img src="Images/billie eillish.png" alt="Billie Eillish" loading="lazy">
            </div>
            <div class="album-meta">
              <b>Billie Eillish</b>
              <span>Artist</span>
            </div>
          </a>

          <a class="album-card" href="The-Neighbourhood.html" data-search="The Neighbourhood" data-bg="#2f3d4e" data-preview="Audios/The Neighbourhood/sweater weather.mp3">
            <div class="album-art">
              <img src="Images/the neighbourhood.jpg" alt="The Neighbourhood" loading="lazy">
            </div>
            <div class="album-meta">
              <b>The Neighbourhood</b>
              <span>Artist</span>
            </div>
          </a>

          <a class="album-card" href="Talha-Anjum.html" data-search="Talha Anjum" data-bg="#1f5f32" data-preview="Audios/Talha Anjum/Afsanay.mp3">
            <div class="album-art">
              <img src="Images/talha anjum.jpg" alt="Talha Anjum" loading="lazy">
            </div>
            <div class="album-meta">
              <b>Talha Anjum</b>
              <span>Artist</span>
            </div>
          </a>

          <a class="album-card" href="Chase-Atlantic.html" data-search="Chase Atlantic" data-bg="#18475f" data-preview="Audios/Chase Atlantic/Church.mp3">
            <div class="album-art">
              <img src="Images/chase atlantic.jpg" alt="Chase Atlantic" loading="lazy">
            </div>
            <div class="album-meta">
              <b>Chase Atlantic</b>
              <span>Artist</span>
            </div>
          </a>

          <a class="album-card" href="Kendrick Lamar.html" data-search="Kendrick Lamar" data-bg="#3b2a1f" data-preview="Audios/Kendrick Lamar/Humble.mp3">
  <div class="album-art">
    <img src="Images/kendrick lamar.jpg" alt="Kendrick Lamar" loading="lazy">
  </div>
  <div class="album-meta">
    <b>Kendrick Lamar</b>
    <span>Artist</span>
  </div>
</a>

  <a class="album-card" href="Adele.html" data-search="Adele" data-bg="#3b2a1f" data-preview="Audios/Adele/Chasing Pavements.mp3">
  <div class="album-art">
    <img src="Images/adele.png" alt="Adele" loading="lazy">
  </div>

  <div class="album-meta">
    <b>Adele</b>
    <span>Artist</span>
  </div>
</a>

        </div>

        <div class="empty-state hidden">No matches found. Try another artist or song.</div>
      </section>
    </main>

    <div class="page-transition"></div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
