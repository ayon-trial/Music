<!DOCTYPE html>
<html>
<head>
<title>The Neighbourhood</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../Style%20Index.css">

</head>

<body>

<div id="menu">
<a id="logo" href="index.html"><h2>Spotify</h2></a>
<input type="text" id="search" placeholder="Search...">
</div>

<div id="conteudo">

<div id="album-header">
<img src="Images/the neighbourhood.jpg">
<div>
<h1>The Neighbourhood</h1>
<p>Artist • Playlist</p>
</div>
</div>

<br/>

<div id="song-list">
<div class="song" onclick="playSong(0)"><img src="Audios/The Neighbourhood/Sweater Weather.jpg">Sweater Weather</div>
<div class="song" onclick="playSong(1)"><img src="Audios/The Neighbourhood/The Neighbourhood.jpg">Reflections</div>
<div class="song" onclick="playSong(2)"><img src="Audios/The Neighbourhood/The Neighbourhood.jpg">Softcore</div>
<div class="song" onclick="playSong(3)"><img src="Audios/The Neighbourhood/Daddy Issues.jpg">Daddy Issues</div>
<div class="song" onclick="playSong(4)"><img src="Audios/The Neighbourhood/The Neighbourhood.jpg">You Get Me So High</div>
<div class="song" onclick="playSong(5)"><img src="Audios/The Neighbourhood/A Little Death.jpg">A Little Death</div>
<div class="song" onclick="playSong(6)"><img src="Audios/The Neighbourhood/Afraid.jpg">Afraid</div>
<div class="song" onclick="playSong(7)"><img src="Audios/The Neighbourhood/Cry Baby.jpg">Cry Baby</div>
<div class="song" onclick="playSong(8)"><img src="Audios/The Neighbourhood/Nervous.jpg">Nervous</div>
<div class="song" onclick="playSong(9)"><img src="Audios/The Neighbourhood/The Beach.jpg">The Beach</div>
</div>

</div>

<div id="player">

Now Playing: <span id="nowPlaying">None</span>

<br/><br/>

<input type="range" id="progress" value="0" disabled>
<span id="time">0:00 / 0:00</span>

<br/><br/>

<button class="control-btn" onclick="prevSong()">
<svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
</button>

<button id="playBtn" onclick="togglePlay()" disabled>
<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
</button>

<button class="control-btn" onclick="nextSong()">
<svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
</button>

<button id="loopBtn" class="control-btn" onclick="toggleLoop()">
<svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4V6H7v4H5V6a2 2 0 0 1 2-2h10V1zM7 23l-4-4 4-4v3h10v-4h2v4a2 2 0 0 1-2 2H7v3z"/></svg>
</button>

<div class="controls">
<button id="muteBtn" onclick="toggleMute()">🔊</button>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let nowPlaying = document.getElementById("nowPlaying");
let progress = document.getElementById("progress");
let volume = document.getElementById("volume");
let muteBtn = document.getElementById("muteBtn");
let playBtn = document.getElementById("playBtn");
let loopBtn = document.getElementById("loopBtn");
let timeDisplay = document.getElementById("time");

let songs = document.getElementsByClassName("song");

let playlist = [
"Audios/The Neighbourhood/sweater weather.mp3",
"Audios/The Neighbourhood/reflections.mp3",
"Audios/The Neighbourhood/softcore.mp3",
"Audios/The Neighbourhood/daddy issues.mp3",
"Audios/The Neighbourhood/You Get Me So High.mp3",
"Audios/The Neighbourhood/A Little Death.mp3",
"Audios/The Neighbourhood/Afraid.mp3",
"Audios/The Neighbourhood/Cry Baby.mp3",
"Audios/The Neighbourhood/Nervous.mp3",
"Audios/The Neighbourhood/The Beach.mp3"
];

let names = [
"Sweater Weather",
"Reflections",
"Softcore",
"Daddy Issues",
"You Get Me So High",
"A Little Death",
"Afraid",
"Cry Baby",
"Nervous",
"The Beach"
];

let currentSong = -1;

function updateBar(el) {
let value = (el.value - el.min) / (el.max - el.min) * 100;

if (el.id === "progress") {
el.style.background = `linear-gradient(to right,
#1DB954 0%,
#1DB954 ${value}%,
#333 ${value}%,
#333 100%)`;
} else {
el.style.background = `linear-gradient(to right, #888 ${value}%, #333 ${value}%)`;
}
}

function playSong(index) {
currentSong = index;
audio.src = playlist[index];
audio.play();

nowPlaying.innerText = names[index];

progress.disabled = false;
playBtn.disabled = false;

for (let i = 0; i < songs.length; i++) {
songs[i].classList.remove("active");
}
songs[index].classList.add("active");
}

function togglePlay() {
audio.paused ? audio.play() : audio.pause();
}

function nextSong() {
currentSong = (currentSong + 1) % playlist.length;
playSong(currentSong);
}

function prevSong() {
currentSong = (currentSong - 1 + playlist.length) % playlist.length;
playSong(currentSong);
}

function toggleLoop() {
audio.loop = !audio.loop;
loopBtn.classList.toggle("active", audio.loop);
}

function toggleMute() {
audio.muted = !audio.muted;
muteBtn.innerText = audio.muted ? "🔇" : "🔊";
}

audio.ontimeupdate = function () {
if (audio.duration) {
let percent = (audio.currentTime / audio.duration) * 100;
progress.value = percent;
updateBar(progress);

timeDisplay.innerText =
Math.floor(audio.currentTime / 60) + ":" +
String(Math.floor(audio.currentTime % 60)).padStart(2, "0") +
" / " +
Math.floor(audio.duration / 60) + ":" +
String(Math.floor(audio.duration % 60)).padStart(2, "0");
}
};

volume.oninput = function () {
audio.volume = this.value;
updateBar(this);
};

progress.oninput = function () {
audio.currentTime = (progress.value / 100) * audio.duration;
};

updateBar(volume);
updateBar(progress);

audio.onplay = () => {
playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
};

audio.onpause = () => {
playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
};

audio.onended = () => {
if (currentSong >= 0) {
nextSong();
}
};
</script>

</body>
</html>
