<!DOCTYPE html>
<html>
<head>
<title>Talha Anjum</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../Style%20Index.css">



</head>

<body>

<div id="menu">
<a id="logo" href="index.html"><h2>Spotify</h2></a>
<input type="text" id="search" placeholder="Search...">
</div>

<div id="conteudo">

<div id="album-header">
<img src="Images/talha anjum.jpg">
<div>
<h1>Talha Anjum</h1>
<p>Artist • Playlist</p>
</div>
</div>

<br/>

<div class="song" onclick="playSong(0)"><img src="Audios/Talha Anjum/Afsanay.jpg" class="song-icon">Afsanay</div>
<div class="song" onclick="playSong(1)"><img src="Audios/Talha Anjum/Agency.jpg" class="song-icon">Agency</div>
<div class="song" onclick="playSong(2)"><img src="Audios/Talha Anjum/Talha Anjum.jpg" class="song-icon">Departure Lane</div>
<div class="song" onclick="playSong(3)"><img src="Audios/Talha Anjum/Talha Anjum 2.jpg" class="song-icon">Downers At Dusk</div>
<div class="song" onclick="playSong(4)"><img src="Audios/Talha Anjum/Talha Anjum 2.jpg" class="song-icon">Happy Hour</div>
<div class="song" onclick="playSong(5)"><img src="Audios/Talha Anjum/Talha Anjum.jpg" class="song-icon">Heartbreak Kid</div>
<div class="song" onclick="playSong(6)"><img src="Audios/Talha Anjum/Kaun Talha.jpg" class="song-icon">Kaun Talha</div>
<div class="song" onclick="playSong(7)"><img src="Audios/Talha Anjum/Me  And  You.jpg" class="song-icon">Me And You</div>
<div class="song" onclick="playSong(8)"><img src="Audios/Talha Anjum/Regrets.jpg" class="song-icon">Regrets</div>
<div class="song" onclick="playSong(9)"><img src="Audios/Talha Anjum/Since Tum.jpg" class="song-icon">Since Tum</div>

</div>

<div id="player">

Now Playing: <span id="nowPlaying">None</span>

<br/><br/>

<input type="range" id="progress" value="0" disabled>
<span id="time">0:00 / 0:00</span>

<br/><br/>

<!-- CONTROLS -->
<button class="control-btn" onclick="prevSong()">
<svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
</button>

<button id="playBtn" onclick="togglePlay()" disabled>
<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
</button>

<button class="control-btn" onclick="nextSong()">
<svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
</button>

<button id="loopBtn" class="control-btn" onclick="toggleLoop()">
<svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4V6H7v4H5V6a2 2 0 0 1 2-2h10V1zM7 23l-4-4 4-4v3h10v-4h2v4a2 2 0 0 1-2 2H7v3z"/></svg>
</button>

<div class="controls">
<button id="muteBtn" onclick="toggleMute()">🔊</button>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let nowPlaying = document.getElementById("nowPlaying");
let progress = document.getElementById("progress");
let volume = document.getElementById("volume");
let muteBtn = document.getElementById("muteBtn");
let playBtn = document.getElementById("playBtn");
let loopBtn = document.getElementById("loopBtn");
let timeDisplay = document.getElementById("time");

let songs = document.getElementsByClassName("song");

let playlist = [
"Audios/Talha Anjum/Afsanay.mp3",
"Audios/Talha Anjum/Agency.mp3",
"Audios/Talha Anjum/Departure Lane.mp3",
"Audios/Talha Anjum/Downers At Dusk.mp3",
"Audios/Talha Anjum/Happy Hour.mp3",
"Audios/Talha Anjum/Heartbreak Kid.mp3",
"Audios/Talha Anjum/Kaun Talha.mp3",
"Audios/Talha Anjum/Me  And  You.mp3",
"Audios/Talha Anjum/Regrets.mp3",
"Audios/Talha Anjum/Since Tum.mp3"
];

let names = [
"Afsanay",
"Agency",
"Departure Lane",
"Downers At Dusk",
"Happy Hour",
"Heartbreak Kid",
"Kaun Talha",
"Me And You",
"Regrets",
"Since Tum"
];

let currentSong = -1;

function playSong(index) {
    currentSong = index;
    audio.src = playlist[index];
    audio.play();
    nowPlaying.innerText = names[index];
    progress.disabled = false;
    playBtn.disabled = false;

    for (let i = 0; i < songs.length; i++) {
        songs[i].classList.remove("active");
    }

    songs[index].classList.add("active");
}

function togglePlay() {
    audio.paused ? audio.play() : audio.pause();
}

function nextSong() {
    currentSong = (currentSong + 1) % playlist.length;
    playSong(currentSong);
}

function prevSong() {
    currentSong = (currentSong - 1 + playlist.length) % playlist.length;
    playSong(currentSong);
}

function toggleLoop() {
    audio.loop = !audio.loop;
    loopBtn.classList.toggle("active", audio.loop);
}

function toggleMute() {
    audio.muted = !audio.muted;
    muteBtn.innerText = audio.muted ? "🔇" : "🔊";
}

audio.ontimeupdate = function () {
    if (audio.duration) {
        progress.value = (audio.currentTime / audio.duration) * 100;

        timeDisplay.innerText =
        Math.floor(audio.currentTime / 60) + ":" +
        String(Math.floor(audio.currentTime % 60)).padStart(2, "0") +
        " / " +
        Math.floor(audio.duration / 60) + ":" +
        String(Math.floor(audio.duration % 60)).padStart(2, "0");
    }
};

volume.oninput = function () {
    audio.volume = this.value;
};

progress.oninput = function () {
    audio.currentTime = (progress.value / 100) * audio.duration;
};

audio.onplay = () => {
    playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
};

audio.onpause = () => {
    playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
};

audio.onended = () => {
    if (!audio.loop) {
        nextSong();
    }
};
</script>

</body>
</html>
